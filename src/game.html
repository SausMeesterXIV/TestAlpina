<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Alpina | Game Session</title>

        <link rel="stylesheet" href="assets/css/reset.css">
        <link rel="stylesheet" href="assets/css/screen.css">
        <link rel="stylesheet" href="assets/css/game.css">

        <script src="assets/js/game.js" type="module"></script>

        <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
        <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5">

    </head>
    <body>
        <nav>
            <ul id="navbar">
                <li id="alpina">ALPINA</li>
                <li id="right-side">
                    <a href="rules.html" target="_blank">Rules</a>
                    <a href="#">Sound</a>
                </li> 
            </ul>
        </nav>
        <main>
            <section id="status-panel">
                <article id="leaderboard">
                    <h2>Leaderboard</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Pos.</th>
                                <th>Name</th>
                                <th>Hikers</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!--The leaderboard data comes here-->
                        </tbody>
                    </table>
                </article>
                <aside id="turn-info">
                    <h2 id="turn-name">Rhune's turn</h2> <!--Must change dynamically eventually, change this later-->
                    <progress id="progress" value="0" max="60"></progress> <!--This indicates how much time a player has left. Extra info: https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/progress-->
                </aside>
            </section>
             <section id="game-board"> <!--divs are temporary for styling purposes, remove it later-->
             </section>
            <section id="player-controls">
                <button id="select-hiker-button" disabled>Select hiker <span class="hikers-left"></span></button>
                <button id="end-turn-button" disabled>End Turn</button>
            </section>

            <section id="bottom-area">
                <div id="hand">
                    <!--here the cards which the user possesses will be added-->
                </div>
                <template id="card-template">
                    <article class="card" data-card-id="#">
                        <img class="card-image" src="#" alt="tmp">
                        <p class="win-conditions">#</p>
                        <img class = "hiker hidden" src="assets/media/Alpina_Hiker.png" alt="tmp">
                        <!--voorlopig gwn als image, deze wel nog veranderen naar een BG-image -->
                    </article>
                </template>
            </section>
            <template id="leaderboard-template">
                <tr>
                    <td class="leaderboard-pos">#</td> <!--Pos.-->
                    <td class="leaderboard-name">Name</td>
                    <td class="leaderboard-hikers">Amount of hikers</td>
                    <td class="leaderboard-points">Points</td>
                </tr>
            </template>
        </main>
        <footer>
            <button id="leave-button">Leave game</button>
        </footer>
    </body>

    <template id="tile-template">
        <div class="tile" data-index="0" data-card="1"></div>
    </template>
</html>
