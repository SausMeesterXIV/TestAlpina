<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Alpina | Game Session</title>

        <link rel="stylesheet" href="assets/css/reset.css">
        <link rel="stylesheet" href="assets/css/screen.css">
        <link rel="stylesheet" href="assets/css/game.css">

        <script src="assets/js/game.js" type="module"></script>

        <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
        <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5">

    </head>
    <body>
        <nav>
            <ul id="navbar">
                <li><a href="#">back</a></li>
                <li id="alpina">ALPINA</li>
                <li><a href="#">rules</a></li>
                <li><a href="#" id="settings">settings</a></li>
            </ul>
        </nav>
        <main>
            <section id="status-panel">
                <article id="leaderboard">
                    <h2>Leaderboard</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Pos.</th>
                                <th>Name</th>
                                <th>Hikers</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr> <!--Example data, remove later-->
                                <td>#1</td>
                                <td>Tibo</td>
                                <td>0</td>
                                <td>50</td>
                            </tr>
                            <tr> <!--Example data, remove later-->
                                <td>#2</td>
                                <td>Dayvid</td>
                                <td>0</td>
                                <td>50</td>
                            </tr>
                        </tbody>
                    </table>
                </article>
                <aside id="turn-info">
                    <h2 id="turn-name">Rhune's turn</h2>
                    <progress id="progress" value="0" max="60"></progress> <!--This indicates how much time a player has left. Extra info: https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/progress-->
                </aside>
            </section>
             <section id="game-board"> <!--divs are temporary for styling purposes, remove it later-->
             </section>
            <section id="player-controls">
                <button id="select-hiker-button">Select hiker</button>
                <button id="end-turn-button">End Turn</button>
            </section>

            <section id="bottom-area">
                <div id="hand">
                    <!--here the cards which the user possesses will be added-->
                </div>
                <template id="card-template">
                    <article class="card" data-card-id="#">
                        <img class="card-image" src="#" alt="tmp">
                        <p class="win-conditions">#</p>
                    </article>
                </template>
            </section>
        </main>
        <footer>
            <button id="leave-button">Leave game</button>
        </footer>
    </body>

    <template id="tile-template">
        <div class="tile" data-index="0" data-card="1"></div>
    </template>
</html>
