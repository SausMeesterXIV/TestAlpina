<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lobby</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/screen.css">


</head>
<body>

<h1>New expedition</h1>

<form>
    <label for="Expedition name">Expedition name:</label><br>
    <input type="text" id="Expedition name" name="expedition name" ><br>
</form>

<form>
    <p>Players</p>
    <input type="radio" id="2" name="amount of players" value="2">
    <label for="2">2</label><br>
    <input type="radio" id="3" name="amount of players" value="3">
    <label for="3">3</label><br>
    <input type="radio" id="4" name="amount of players" value="4">
    <label for="4">4</label>
</form>
<form>
    <p>Max turn time (in seconds)   </p>
    <input type="radio" id="10" name="amount of players" value="10"><br>
    <label for="10">10</label><br>
    <input type="radio" id="20" name="amount of players" value="20"><br>
    <label for="20">20</label><br>
    <input type="radio" id="30" name="amount of players" value="30"><br>
    <label for="30">30</label><br>
    <input type="radio" id="40" name="amount of players" value="40"><br>
    <label for="40">40</label>

</form>
<form>
    <label for="Private">Private?</label><br>
    <input type="checkbox" id="Private" name="private"><br>
</form>


<form>
    <label>Create expedition</label><br>
    <input type="submit" value="Submit">
</form>
</body>
</html>
