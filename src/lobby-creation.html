<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Alpina | Lobby creation</title>

    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5">


    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/lobbyCreation.css">
    <link rel="stylesheet" href="assets/css/screen.css">



</head>
<body>
<nav>
    <ul id="navbar">
        <li><a href="#">back</a></li>
        <li id="alpina">ALPINA</li>
        <li><a href="#">rules</a></li>
        <li><a href="#" id="settings">settings</a></li>
    </ul>
</nav>

<h1>New expedition</h1>

<form id="name">
    <label for="Expedition name">Expedition name:</label><br>
    <input type="text" id="Expedition name" name="expedition name" placeholder="e.g. ILoveAnimals" ><br>
</form>

<form id="players">
    <h2>Players:</h2>
    <input type="radio" id="player-choice-2" name="amount of players" value="2">
    <label for="player-choice-2">2</label>
    <input type="radio" id="player-choice-3" name="amount of players" value="3">
    <label for="player-choice-3">3</label>
    <input type="radio" id="player-choice-4" name="amount of players" value="4">
    <label for="player-choice-4">4</label>
</form>
<form id="time">
    <h2>Max turn time (in seconds):</h2>
    <input type="radio" id="time-choice-20" name="amount of time" value="10">
    <label for="time-choice-20">20</label>
    <input type="radio" id="time-choice-40" name="amount of time" value="20">
    <label for="time-choice-40">40</label>
    <input type="radio" id="time-choice-60" name="amount of time" value="30">
    <label for="time-choice-60">60</label>
</form>
<form>
    <label for="Private">Private?</label>
    <input type="checkbox" id="Private" name="private">
</form>


<form>
    <input type="button" value="Create expedition">
</form>

</body>
</html>
