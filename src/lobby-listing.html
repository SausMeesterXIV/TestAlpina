<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>join expedition</title>

    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5">

  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/typography.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/buttons.css">
  <link rel="stylesheet" href="assets/css/input-fields.css">
  <link rel="stylesheet" href="assets/css/expedition-list.css">
  <link rel="stylesheet" href="assets/css/page-lobby-listing.css">

    <script src="./assets/js/lobby-listing.js" type="module"></script>
</head>
<body>
    <nav>
        <ul id="navbar">
            <li><a href="index.html">Back</a></li>
            <li id="alpina">ALPINA</li>
            <li id="right-side">
                <a href="rules.html" target="_blank">Rules</a>
                <a href="#">Sound</a>
            </li> 
        </ul>
    </nav>

    <main>
        <h1>Join Expedition</h1>
        <div>
            <section id="active-expeditions">
                <h2>active expeditions</h2>
                <p  class="comment">join an existing party or scout a new trail</p>

                <div id="lobby-tabs">
                    <button id="tab-unstarted" class="tab active" data-tab="unstarted">Waiting Lobby</button>
                    <button id="tab-started" class="tab" data-tab="started">Live Expeditions</button>
                </div>

                <div id="expeditions">
                    <!--Game list comes here-->
                </div>
                <button type="button" id="new-expedition-button">new expedition</button>
            </section>

            <section id="private-expedition">
                <h2>join private game</h2>
                <form>
                    <label for="secret-code-input">secret code:</label>
                    <input type="text" name="secret-code" id="secret-code-input" placeholder="984327429">

                    <button type="submit" id="join-game">join game</button>
                </form>
            </section>
        </div>
    </main>
    <template id="expedition-template">
        <div class="expedition">
            <div class="expedition-info">
                <p class="comment">ID: gameId</p>
                <h2>Expedition name</h2>
                <p>x/x players</p>
            </div>

            <input type="button" value="spectate" data-id="1">
            <input type="button" value="join" data-id="1">
        </div>
    </template>
</body>
</html>
